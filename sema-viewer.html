<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.sema Viewer — TREN Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'IBM Plex Mono',monospace,system-ui;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:14px;font-weight:700;color:#e6edf3}.logo span{color:#00ff88}
.badge{background:#00ff88;color:#000;font-size:11px;font-weight:800;padding:4px 10px;letter-spacing:1px}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
#drop{border:2px dashed #30363d;padding:60px 40px;text-align:center;max-width:500px;width:100%;cursor:pointer;transition:all .2s}
#drop.ov{border-color:#00ff88;background:#001a0a}
#drop.ok{border-color:#00ff88;border-style:solid}
.di{font-size:48px;margin-bottom:16px;opacity:.5}
.dt{font-size:14px;color:#8b949e;line-height:1.8}
.dn{font-size:16px;color:#00ff88;font-weight:700;margin-top:8px}
#result{display:none;max-width:700px;width:100%;margin-top:32px}
#result.v{display:block}
.card{background:#161b22;border:1px solid #30363d;padding:24px;margin-bottom:16px}
.cl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#00ff88;margin-bottom:12px}
.ct{font-size:15px;color:#e6edf3;line-height:1.7}
.kws{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.kw{background:#0d1117;border:1px solid #30363d;padding:4px 10px;font-size:12px;border-radius:20px;color:#8b949e}
.ask-row{display:flex;gap:10px;margin-top:14px}
#qi{flex:1;background:#0d1117;border:1px solid #30363d;color:#e6edf3;padding:10px 14px;font-size:13px;font-family:inherit;outline:none}
#qi:focus{border-color:#00ff88}
#ab{background:#00ff88;color:#000;font-weight:700;border:none;padding:10px 18px;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:1px}
#ans{margin-top:12px;font-size:13px;color:#aaa;padding:12px;background:#0d1117;border-left:3px solid #00ff88;display:none;line-height:1.6}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.mi{display:flex;flex-direction:column;gap:3px}
.mk{font-size:10px;color:#8b949e;letter-spacing:1px;text-transform:uppercase}
.mv{font-size:13px;font-weight:600;word-break:break-all}
footer{text-align:center;padding:20px;color:#3a3a3a;font-size:11px;letter-spacing:2px;border-top:1px solid #1a1a1a}
footer a{color:#555;text-decoration:none}
</style>
</head>
<body>
<header>
  <div class="logo">TREN<span>studio</span> · .sema Viewer</div>
  <div class="badge">.sema v1.0</div>
</header>
<main>
  <div id="drop" onclick="document.getElementById('fi').click()">
    <div class="di">📁</div>
    <div class="dt">Drop a <strong style="color:#00ff88">.sema</strong> file here to open it<br><span style="color:#444">or click to browse</span></div>
    <input type="file" id="fi" accept=".sema" style="display:none">
  </div>
  <div id="result">
    <div class="card">
      <div class="cl">📋 Summary</div>
      <div class="ct" id="r-sum"></div>
      <div class="kws" id="r-kw"></div>
    </div>
    <div class="card">
      <div class="cl">💬 Ask This File</div>
      <div class="ask-row">
        <input type="text" id="qi" placeholder="Ask anything... / ما هذا الملف؟">
        <button id="ab">Ask →</button>
      </div>
      <div id="ans"></div>
    </div>
    <div class="card">
      <div class="cl">📌 File Info</div>
      <div class="mg" id="r-meta"></div>
    </div>
  </div>
</main>
<footer><a href="https://trenstudio.com/sema">trenstudio.com/sema</a> · .sema Format v1.0 · MIT License</footer>
<script>
let brain=null;
const drop=document.getElementById('drop'),fi=document.getElementById('fi'),result=document.getElementById('result');
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('ov')}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('ov')}));
drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)open(f)});
fi.addEventListener('change',e=>{if(e.target.files[0])open(e.target.files[0])});
async function open(file){
  drop.classList.add('ok');
  drop.querySelector('.dt').innerHTML=`<div class="dn">${file.name}</div><div style="color:#444;font-size:12px;margin-top:4px">${(file.size/1024).toFixed(1)} KB · reading...</div>`;
  try{
    const JSZip=(await import('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js')).default;
    // fallback — read as text and parse JSON
    const ab=await file.arrayBuffer();
    // Try to extract brain.json and sema.json using basic zip reading
    const text=new TextDecoder('utf-8').decode(ab);
    // find brain.json content between markers
    const bi=text.indexOf('brain.json');
    document.getElementById('r-sum').textContent='File loaded — brain.json extraction requires JSZip. Drop on a Python-converted file.';
    result.classList.add('v');
  }catch(e){
    // Simple fallback
    document.getElementById('r-sum').textContent=`File: ${file.name} (${(file.size/1024).toFixed(1)} KB) — Open with the sema_builder tool to generate a full viewer.`;
    result.classList.add('v');
  }
}
document.getElementById('ab').addEventListener('click',doAsk);
document.getElementById('qi').addEventListener('keydown',e=>{if(e.key==='Enter')doAsk()});
function doAsk(){
  if(!brain)return;
  const q=document.getElementById('qi').value.trim().toLowerCase();
  const ans=document.getElementById('ans');
  ans.style.display='block';
  const qw=q.split(' ').filter(x=>x.length>2);
  let best=null,bs=0;
  for(const p of brain.qa||[]){const sc=qw.filter(x=>p.q.toLowerCase().includes(x)).length;if(sc>bs){bs=sc;best=p}}
  ans.textContent=best&&bs>=1?best.a:"No answer found for this question.";
}
</script>
</body>
</html>
